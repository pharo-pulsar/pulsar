name: Build Pulsar

on:
  push:

jobs:
  test:
    runs-on: docker
    container:
      image: forge.smallworks.eu/pharo/build-env:ubuntu-24.04

    steps:
 
#      - name: Install Pharo VM
#        run: |
#          # Add OBS repo (WARNING: trusted=yes disables signature verification for this repo)
#          echo "deb [trusted=yes] https://download.opensuse.org/repositories/devel:/languages:/pharo:/stable/xUbuntu_24.04/ /" \
#            > /etc/apt/sources.list.d/obs-pharo.list
#          apt-get update
#          apt-get install -y pharo

      - name: Setup SSH key
        env:
          CI_SSH_KEY: ${{ secrets.CI_SSH_KEY }}
        run: |
          mkdir -p /root/.ssh
          chmod 700 /root/.ssh
          printf "%s" "$CI_SSH_KEY" > /root/.ssh/id_ed25519
          chmod 600 /root/.ssh/id_ed25519
          ssh-keyscan forge.smallworks.eu >> /root/.ssh/known_hosts
          ssh-keyscan github.com >> /root/.ssh/known_hosts

      - name: Run build script
        run: |
          mkdir build && cd build
          python3 ../.ci/scripts/build.py

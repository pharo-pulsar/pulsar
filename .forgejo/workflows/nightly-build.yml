name: Nightly-build Pulsar

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  nightly:
    runs-on: docker
    container:
      image: forge.smallworks.eu/pharo/build-env:ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          CI_SSH_PRIVATE_KEY: ${{ secrets.CI_SSH_PRIVATE_KEY }}
          CI_SSH_PUBLIC_KEY: ${{ secrets.CI_SSH_PUBLIC_KEY }}
        run: |
          mkdir -p /root/.ssh
          chmod 700 /root/.ssh
          printf "%s" "$CI_SSH_PRIVATE_KEY" > /root/.ssh/id_ed25519
          printf "%s" "$CI_SSH_PUBLIC_KEY" > /root/.ssh/id_ed25519.pub
          chmod 600 /root/.ssh/id_ed25519
          chmod 600 /root/.ssh/id_ed25519.pub
          ssh-keyscan forge.smallworks.eu >> /root/.ssh/known_hosts
          ssh-keyscan github.com >> /root/.ssh/known_hosts

      - name: Run build script
        run: |
          mkdir -p build && cd build
          python -u ../.ci/scripts/build.py

      - name: Set nightly date
        run: |
          NIGHTLY_DATE=$(date +%F)
          echo "NIGHTLY_DATE=$NIGHTLY_DATE" >> $GITHUB_ENV
          echo "Nightly date: $NIGHTLY_DATE"

      - name: Rename nightly artifact
        run: mv build/dist/Pulsar.tar.gz build/dist/Pulsar-${NIGHTLY_DATE}.tar.gz

      - name: Keep nightly-built artifact
        uses: actions/upload-artifact@v3
        with:
          name: nightly-build
          path: build/dist/Pulsar-${{ env.NIGHTLY_DATE }}.tar.gz

      - name: Upload nightly-built artifact to Packages
        env:
          CI_UPLOAD_TOKEN: ${{ secrets.CI_UPLOAD_TOKEN }}
        run: |          
          FILE="Pulsar-${NIGHTLY_DATE}.tar.gz"
          curl -f -X PUT \
            -H "Authorization: token $CI_UPLOAD_TOKEN" \
            --upload-file build/dist/$FILE \
            "$FORGEJO_SERVER_URL/api/packages/$FORGEJO_REPOSITORY_OWNER/generic/pulsar-nightly-build/${NIGHTLY_DATE}/$FILE"

      - name: Cleanup old nightly builds (keep last 10 days)
        env:
          CI_UPLOAD_TOKEN: ${{ secrets.CI_UPLOAD_TOKEN }}
        run: |
          set -euo pipefail

          KEEP_DAYS=10
          CUTOFF_DATE=$(date -u -d "-${KEEP_DAYS} days" +%F)

          OWNER="$FORGEJO_REPOSITORY_OWNER"
          PKG_NAME="pulsar-nightly-build"

          echo "🧹 Cleaning nightly builds older than $CUTOFF_DATE (UTC)"
          echo "📦 Owner: $OWNER, Package: $PKG_NAME"

          # 1) List packages via API (it lists by owner, not by package)
          LIST_URL="$FORGEJO_SERVER_URL/api/v1/packages/$OWNER?limit=500"
          echo "🔎 Listing packages: $LIST_URL"

          RESP_FILE="$(mktemp)"
          HTTP_CODE="$(
            curl -sS -o "$RESP_FILE" -w "%{http_code}" \
              -H "Accept: application/json" \
              -H "Authorization: token $CI_UPLOAD_TOKEN" \
              "$LIST_URL" || true
          )"

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "❌ Failed to list packages (HTTP $HTTP_CODE). Response:"
            cat "$RESP_FILE" || true
            exit 1
          fi

          # 2) Extract versions for this generic package, expecting YYYY-MM-DD
          jq -r --arg name "$PKG_NAME" '
            .[]
            | select(.type == "generic" and .name == $name)
            | .version
          ' "$RESP_FILE" \
          | sort \
          | while read -r VERSION; do
              [[ -z "$VERSION" ]] && continue

              if [[ ! "$VERSION" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
                echo "⚠️  Skipping non-date version: $VERSION"
                continue
              fi

              if [[ "$VERSION" < "$CUTOFF_DATE" ]]; then
                echo "❌ Deleting nightly build $VERSION"
                curl -f -sS -X DELETE \
                  -H "Authorization: token $CI_UPLOAD_TOKEN" \
                  "$FORGEJO_SERVER_URL/api/packages/$OWNER/generic/$PKG_NAME/$VERSION" \
                  >/dev/null
              else
                echo "✅ Keeping nightly build $VERSION"
              fi
            done
